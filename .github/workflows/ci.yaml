name: CI Pipeline

on:
  push:
  pull_request:

jobs:
  project-testing:
    runs-on: ubuntu-latest

    env:
      DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      MLFLOW_TRACKING_URI: https://dagshub.com/sreesh49/YT-Capstone-Project.mlflow
      MLFLOW_TRACKING_USERNAME: token
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}

    steps:
      # =========================
      # Checkout
      # =========================
      - name: Checkout code
        uses: actions/checkout@v3

      # =========================
      # Python setup
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # =========================
      # Pip cache
      # =========================
      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      # =========================
      # DVC cache (IMPORTANT FIX)
      # =========================
      - name: Cache DVC
        uses: actions/cache@v3
        with:
          path: .dvc/cache
          key: ${{ runner.os }}-dvc-${{ hashFiles('dvc.lock') }}

      # =========================
      # Install dependencies
      # =========================
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install dvc dagshub mlflow

      # =========================
      # NLTK setup
      # =========================
      - name: Download NLTK data
        run: |
          python -c "import nltk; nltk.download('stopwords'); nltk.download('wordnet')"

      # =========================
      # Debug secrets
      # =========================
      - name: Debug secrets
        run: |
          echo "AWS KEY EXISTS: ${AWS_ACCESS_KEY_ID:+YES}"
          echo "DAGSHUB TOKEN EXISTS: ${DAGSHUB_TOKEN:+YES}"

      # =========================
      # Run full DVC pipeline
      # =========================
      - name: Run DVC pipeline
        run: |
          dvc repro

      # =========================
      # Optional: push artifacts (MLflow/DVC)
      # =========================
      - name: Push DVC changes (optional)
        run: |
          dvc push || echo "No remote push configured"